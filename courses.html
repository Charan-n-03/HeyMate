<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Courses - Hey Mate</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Header injected by JS -->
    <header class="site-header" id="site-header"></header>

    <!-- ========== COURSES PAGE ========== -->
    <main class="courses-page">
        <!-- Page Header with Search -->
        <div class="courses-header fade-in">
            <h1>All Courses</h1>
            <div class="search-box">
                <span class="search-icon">&#128269;</span>
                <input type="text" id="searchInput" placeholder="Search courses, categories, instructors...">
            </div>
        </div>

        <!-- Category Filter Buttons -->
        <div class="filter-bar" id="filterBar">
            <!-- Rendered by JS -->
        </div>

        <!-- Course Cards Grid -->
        <div class="grid-3" id="coursesGrid">
            <!-- Rendered by JS -->
        </div>

        <!-- No Results Message -->
        <div class="no-results" id="noResults" style="display:none;">
            <div class="nr-icon">&#128533;</div>
            <h3>No courses found</h3>
            <p>Try adjusting your search or filter criteria.</p>
        </div>
    </main>

    <!-- Footer injected by JS -->
    <footer class="site-footer" id="site-footer"></footer>

    <!-- Scripts -->
    <script src="js/data.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/common.js"></script>
    <script src="js/courses.js"></script>
</body>
</html>
