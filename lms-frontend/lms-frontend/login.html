<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Hey Mate</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Header injected by JS -->
    <header class="site-header" id="site-header"></header>

    <!-- ========== LOGIN FORM ========== -->
    <main class="auth-page">
        <div class="auth-card fade-in">
            <h2>Welcome Back</h2>
            <p class="auth-sub">Sign in to continue your learning journey</p>

            <form id="loginForm" novalidate>
                <!-- Email Field -->
                <div class="form-group">
                    <label class="form-label" for="loginEmail">Email Address</label>
                    <input type="email" id="loginEmail" class="form-input" placeholder="you@example.com" required>
                    <div class="form-error" id="loginEmailError">Please enter a valid email address.</div>
                </div>

                <!-- Password Field -->
                <div class="form-group">
                    <label class="form-label" for="loginPassword">Password</label>
                    <input type="password" id="loginPassword" class="form-input" placeholder="Enter your password" required>
                    <div class="form-error" id="loginPasswordError">Password is required.</div>
                </div>

                <!-- Login Button -->
                <button type="submit" class="btn btn-primary btn-lg" style="width:100%;">Sign In</button>
            </form>

            <!-- Link to signup -->
            <div class="auth-footer">
                Don't have an account? <a href="signup.html" class="auth-link">Sign Up</a>
            </div>

            <!-- Demo credentials hint -->
            <div class="auth-demo">
                <strong>Demo Credentials:</strong><br>
                Student: john@heymate.com / john123<br>
                Admin: admin@heymate.com / admin123
            </div>
        </div>
    </main>

    <!-- Footer injected by JS -->
    <footer class="site-footer" id="site-footer"></footer>

    <!-- Scripts -->
    <script src="js/data.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/common.js"></script>
    <script>
        /* --- Login Form Validation & Submission --- */
        document.addEventListener('DOMContentLoaded', function() {
            // If already logged in, redirect to dashboard
            if (isLoggedIn()) {
                window.location.href = 'dashboard.html';
                return;
            }

            var form = document.getElementById('loginForm');
            form.addEventListener('submit', function(e) {
                e.preventDefault();
                // Clear previous errors
                document.querySelectorAll('.form-error').forEach(function(el) { el.classList.remove('visible'); });
                document.querySelectorAll('.form-input').forEach(function(el) { el.classList.remove('error'); });

                var email = document.getElementById('loginEmail').value.trim();
                var password = document.getElementById('loginPassword').value;
                var valid = true;

                // Validate email format
                if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                    document.getElementById('loginEmailError').classList.add('visible');
                    document.getElementById('loginEmail').classList.add('error');
                    valid = false;
                }

                // Validate password not empty
                if (!password) {
                    document.getElementById('loginPasswordError').classList.add('visible');
                    document.getElementById('loginPassword').classList.add('error');
                    valid = false;
                }

                if (!valid) return;

                // Attempt login
                var result = login(email, password);
                if (result.success) {
                    showToast('Welcome back, ' + result.user.name + '!', 'success');
                    // Redirect based on role
                    setTimeout(function() {
                        if (result.user.role === 'admin') {
                            window.location.href = 'admin.html';
                        } else {
                            window.location.href = 'dashboard.html';
                        }
                    }, 600);
                } else {
                    showToast(result.message, 'error');
                }
            });
        });
    </script>
</body>
</html>
