<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Hey Mate</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Header injected by JS -->
    <header class="site-header" id="site-header"></header>

    <!-- ========== SIGNUP FORM ========== -->
    <main class="auth-page">
        <div class="auth-card fade-in">
            <h2>Create Account</h2>
            <p class="auth-sub">Join thousands of learners on Hey Mate</p>

            <form id="signupForm" novalidate>
                <!-- Name Field -->
                <div class="form-group">
                    <label class="form-label" for="signupName">Full Name</label>
                    <input type="text" id="signupName" class="form-input" placeholder="Your full name" required>
                    <div class="form-error" id="signupNameError">Name must be at least 2 characters.</div>
                </div>

                <!-- Email Field -->
                <div class="form-group">
                    <label class="form-label" for="signupEmail">Email Address</label>
                    <input type="email" id="signupEmail" class="form-input" placeholder="you@example.com" required>
                    <div class="form-error" id="signupEmailError">Please enter a valid email address.</div>
                </div>

                <!-- Password Field -->
                <div class="form-group">
                    <label class="form-label" for="signupPassword">Password</label>
                    <input type="password" id="signupPassword" class="form-input" placeholder="Minimum 6 characters" required>
                    <div class="form-error" id="signupPasswordError">Password must be at least 6 characters.</div>
                </div>

                <!-- Confirm Password Field -->
                <div class="form-group">
                    <label class="form-label" for="signupConfirm">Confirm Password</label>
                    <input type="password" id="signupConfirm" class="form-input" placeholder="Re-enter your password" required>
                    <div class="form-error" id="signupConfirmError">Passwords do not match.</div>
                </div>

                <!-- Signup Button -->
                <button type="submit" class="btn btn-primary btn-lg" style="width:100%;">Create Account</button>
            </form>

            <!-- Link to login -->
            <div class="auth-footer">
                Already have an account? <a href="login.html" class="auth-link">Sign In</a>
            </div>
        </div>
    </main>

    <!-- Footer injected by JS -->
    <footer class="site-footer" id="site-footer"></footer>

    <!-- Scripts -->
    <script src="js/data.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/common.js"></script>
    <script>
        /* --- Signup Form Validation & Submission --- */
        document.addEventListener('DOMContentLoaded', function() {
            // If already logged in, redirect
            if (isLoggedIn()) {
                window.location.href = 'dashboard.html';
                return;
            }

            var form = document.getElementById('signupForm');
            form.addEventListener('submit', function(e) {
                e.preventDefault();
                // Clear previous errors
                document.querySelectorAll('.form-error').forEach(function(el) { el.classList.remove('visible'); });
                document.querySelectorAll('.form-input').forEach(function(el) { el.classList.remove('error'); });

                var name = document.getElementById('signupName').value.trim();
                var email = document.getElementById('signupEmail').value.trim();
                var password = document.getElementById('signupPassword').value;
                var confirm = document.getElementById('signupConfirm').value;
                var valid = true;

                // Validate name
                if (name.length < 2) {
                    document.getElementById('signupNameError').classList.add('visible');
                    document.getElementById('signupName').classList.add('error');
                    valid = false;
                }

                // Validate email format
                if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                    document.getElementById('signupEmailError').classList.add('visible');
                    document.getElementById('signupEmail').classList.add('error');
                    valid = false;
                }

                // Validate password length
                if (password.length < 6) {
                    document.getElementById('signupPasswordError').classList.add('visible');
                    document.getElementById('signupPassword').classList.add('error');
                    valid = false;
                }

                // Validate passwords match
                if (password !== confirm) {
                    document.getElementById('signupConfirmError').classList.add('visible');
                    document.getElementById('signupConfirm').classList.add('error');
                    valid = false;
                }

                if (!valid) return;

                // Attempt signup
                var result = signup(name, email, password);
                if (result.success) {
                    showToast('Account created! Welcome, ' + result.user.name + '!', 'success');
                    setTimeout(function() { window.location.href = 'dashboard.html'; }, 600);
                } else {
                    showToast(result.message, 'error');
                }
            });
        });
    </script>
</body>
</html>
