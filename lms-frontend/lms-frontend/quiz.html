<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz - Hey Mate</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Header injected by JS -->
    <header class="site-header" id="site-header"></header>

    <!-- ========== QUIZ PAGE ========== -->
    <main class="quiz-page">
        <!-- Quiz Header -->
        <div class="quiz-header fade-in">
            <h1 id="quizTitle">Course Quiz</h1>
            <p>Test your knowledge — you need 70% to pass</p>
        </div>

        <!-- Info Bar: Timer + Progress -->
        <div class="quiz-info-bar fade-in fade-in-delay-1">
            <div class="quiz-timer">
                <span>&#9201;</span>
                <span id="quizTimer">15:00</span>
            </div>
            <div class="quiz-progress-text" id="quizProgressText">Question 1 of 5</div>
        </div>

        <!-- Progress Bar -->
        <div class="quiz-progress-bar">
            <div class="quiz-progress-fill" id="quizProgressFill" style="width:20%"></div>
        </div>

        <!-- Quiz Content: questions or results rendered here -->
        <div id="quizContent">
            <!-- Rendered by quiz.js -->
        </div>
    </main>

    <!-- Footer injected by JS -->
    <footer class="site-footer" id="site-footer"></footer>

    <!-- Scripts -->
    <script src="js/data.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/common.js"></script>
    <script src="js/quiz.js"></script>
</body>
</html>
