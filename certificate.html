<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certificate - Hey Mate</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Header injected by JS -->
    <header class="site-header" id="site-header"></header>

    <!-- ========== CERTIFICATE PAGE ========== -->
    <main class="certificate-page" id="certificatePage">
        <h1 class="fade-in">Your Certificate</h1>
        <p class="fade-in fade-in-delay-1">Congratulations on completing the course!</p>

        <!-- Certificate Canvas -->
        <div class="certificate-wrapper fade-in fade-in-delay-2">
            <canvas id="certificateCanvas" width="800" height="560"></canvas>
        </div>

        <!-- Download / Share Buttons -->
        <div class="certificate-actions fade-in fade-in-delay-3">
            <button class="btn btn-primary" onclick="downloadCertificate()">Download as Image</button>
            <button class="btn btn-outline" onclick="window.print()">Print Certificate</button>
            <a href="dashboard.html" class="btn btn-ghost">Back to Dashboard</a>
        </div>
    </main>

    <!-- Footer injected by JS -->
    <footer class="site-footer" id="site-footer"></footer>

    <!-- Scripts -->
    <script src="js/data.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/common.js"></script>
    <script>
        /* --- Certificate Page: generates certificate using Canvas API --- */
        document.addEventListener('DOMContentLoaded', function() {
            if (!requireLogin()) return;

            var params = new URLSearchParams(window.location.search);
            var courseId = parseInt(params.get('courseId'));
            if (!courseId) { window.location.href = 'dashboard.html'; return; }

            var user = getCurrentUser();
            var courses = getCourses();
            var course = courses.find(function(c) { return c.id === courseId; });
            if (!course) { window.location.href = 'dashboard.html'; return; }

            // Verify quiz was passed
            var quizResults = getQuizResults();
            var result = quizResults[user.id + '_' + courseId];
            if (!result || !result.passed) {
                document.getElementById('certificatePage').innerHTML =
                    '<div class="empty-state" style="margin-top:3rem;">' +
                    '<div class="es-icon">&#128274;</div>' +
                    '<h3>Certificate Locked</h3>' +
                    '<p>You need to pass the quiz with at least 70% to earn this certificate.</p>' +
                    '<a href="quiz.html?courseId=' + courseId + '" class="btn btn-primary">Take Quiz</a>' +
                    '</div>';
                return;
            }

            // Draw the certificate on canvas
            drawCertificate(user, course, result);
        });

        /* --- Draw certificate on canvas --- */
        function drawCertificate(user, course, result) {
            var canvas = document.getElementById('certificateCanvas');
            if (!canvas) return;
            var ctx = canvas.getContext('2d');
            var W = canvas.width;
            var H = canvas.height;

            // Check dark mode for background
            var isDark = document.documentElement.classList.contains('dark');

            // --- Background ---
            ctx.fillStyle = isDark ? '#1C1C30' : '#FFFAF5';
            ctx.fillRect(0, 0, W, H);

            // --- Decorative border ---
            ctx.strokeStyle = '#E85D2A';
            ctx.lineWidth = 4;
            ctx.strokeRect(20, 20, W - 40, H - 40);
            ctx.strokeStyle = '#FFB300';
            ctx.lineWidth = 1.5;
            ctx.strokeRect(28, 28, W - 56, H - 56);

            // --- Corner decorations ---
            var cornerSize = 30;
            ctx.strokeStyle = '#1B5E3B';
            ctx.lineWidth = 2;
            // Top-left
            ctx.beginPath(); ctx.moveTo(20, 20 + cornerSize); ctx.lineTo(20, 20); ctx.lineTo(20 + cornerSize, 20); ctx.stroke();
            // Top-right
            ctx.beginPath(); ctx.moveTo(W - 20 - cornerSize, 20); ctx.lineTo(W - 20, 20); ctx.lineTo(W - 20, 20 + cornerSize); ctx.stroke();
            // Bottom-left
            ctx.beginPath(); ctx.moveTo(20, H - 20 - cornerSize); ctx.lineTo(20, H - 20); ctx.lineTo(20 + cornerSize, H - 20); ctx.stroke();
            // Bottom-right
            ctx.beginPath(); ctx.moveTo(W - 20 - cornerSize, H - 20); ctx.lineTo(W - 20, H - 20); ctx.lineTo(W - 20, H - 20 - cornerSize); ctx.stroke();

            // --- "Hey Mate" logo ---
            ctx.fillStyle = '#E85D2A';
            ctx.font = '900 28px Outfit, sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('Hey', W / 2 - 32, 85);
            ctx.fillStyle = '#1B5E3B';
            ctx.fillText('Mate', W / 2 + 32, 85);

            // --- "Certificate of Completion" ---
            ctx.fillStyle = isDark ? '#F0EDE8' : '#2D2D2D';
            ctx.font = '800 32px Outfit, sans-serif';
            ctx.fillText('Certificate of Completion', W / 2, 140);

            // --- Decorative line ---
            ctx.strokeStyle = '#E85D2A';
            ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(W / 2 - 120, 155); ctx.lineTo(W / 2 + 120, 155); ctx.stroke();

            // --- "This is to certify that" ---
            ctx.fillStyle = isDark ? '#9CA3AF' : '#6B7280';
            ctx.font = '400 14px Outfit, sans-serif';
            ctx.fillText('This is to certify that', W / 2, 195);

            // --- Student Name ---
            ctx.fillStyle = '#E85D2A';
            ctx.font = '800 30px Outfit, sans-serif';
            ctx.fillText(user.name, W / 2, 240);

            // --- "has successfully completed the course" ---
            ctx.fillStyle = isDark ? '#9CA3AF' : '#6B7280';
            ctx.font = '400 14px Outfit, sans-serif';
            ctx.fillText('has successfully completed the course', W / 2, 275);

            // --- Course Title ---
            ctx.fillStyle = isDark ? '#F0EDE8' : '#2D2D2D';
            ctx.font = '700 22px Outfit, sans-serif';
            // Wrap long course titles
            wrapText(ctx, course.title, W / 2, 315, W - 160, 28);

            // --- Course details ---
            ctx.fillStyle = isDark ? '#9CA3AF' : '#6B7280';
            ctx.font = '400 13px Outfit, sans-serif';
            ctx.fillText('Instructor: ' + course.instructor.name + '  |  Duration: ' + course.duration + '  |  Score: ' + result.score + '%', W / 2, 385);

            // --- Date ---
            var today = new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
            ctx.fillText('Date: ' + today, W / 2, 415);

            // --- Signature line ---
            ctx.strokeStyle = isDark ? '#3A3A50' : '#D1D5DB';
            ctx.lineWidth = 1;
            ctx.beginPath(); ctx.moveTo(W / 2 - 80, 490); ctx.lineTo(W / 2 + 80, 490); ctx.stroke();
            ctx.fillStyle = isDark ? '#9CA3AF' : '#6B7280';
            ctx.font = '500 12px Outfit, sans-serif';
            ctx.fillText('Hey Mate Learning Platform', W / 2, 510);
        }

        /* --- Helper: wrap text on canvas --- */
        function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
            var words = text.split(' ');
            var line = '';
            var currentY = y;
            for (var i = 0; i < words.length; i++) {
                var testLine = line + words[i] + ' ';
                var metrics = ctx.measureText(testLine);
                if (metrics.width > maxWidth && i > 0) {
                    ctx.fillText(line, x, currentY);
                    line = words[i] + ' ';
                    currentY += lineHeight;
                } else {
                    line = testLine;
                }
            }
            ctx.fillText(line, x, currentY);
        }

        /* --- Download certificate as PNG image --- */
        function downloadCertificate() {
            var canvas = document.getElementById('certificateCanvas');
            if (!canvas) return;
            var link = document.createElement('a');
            link.download = 'heymate-certificate.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
            showToast('Certificate downloaded!', 'success');
        }
    </script>
</body>
</html>
