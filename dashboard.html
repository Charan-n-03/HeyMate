<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Hey Mate</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Header injected by JS -->
    <header class="site-header" id="site-header"></header>

    <!-- ========== STUDENT DASHBOARD ========== -->
    <main class="dashboard-page">
        <!-- Welcome Section -->
        <div class="dashboard-welcome fade-in">
            <h1>Welcome back, <span id="welcomeName">Student</span></h1>
            <p>Continue where you left off or explore new courses.</p>
        </div>

        <!-- Stats Cards -->
        <div class="dash-stats" id="dashStats">
            <!-- Rendered by JS -->
        </div>

        <!-- In-Progress Courses -->
        <div class="dash-section fade-in fade-in-delay-1">
            <h2>In Progress</h2>
            <div id="inProgressCourses">
                <!-- Rendered by JS -->
            </div>
        </div>

        <!-- Completed Courses -->
        <div class="dash-section mt-3 fade-in fade-in-delay-2">
            <h2>Completed</h2>
            <div id="completedCourses">
                <!-- Rendered by JS -->
            </div>
        </div>
    </main>

    <!-- Footer injected by JS -->
    <footer class="site-footer" id="site-footer"></footer>

    <!-- Scripts -->
    <script src="js/data.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/common.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
